
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1326" />
    <meta name="description" content="Aplikasi manajemen keuangan pribadi dengan fitur lengkap untuk mengelola transaksi, tabungan, dan pengingat finansial" />
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Keuanganku" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Keuanganku" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#0b1326" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/icon-app.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-app.svg" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon-dark.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileImage" content="/icon-dark.svg" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>Keuanganku - Pencatatan Keuangan</title>
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/src/styles/theme.css">
    <style>
      html, body { 
        height: 100%; 
        margin: 0; 
        background-color: #0b1326;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #root { 
        height: 100%; 
      }
      
      /* Prevent pull-to-refresh on mobile */
      body {
        overscroll-behavior-y: contain;
      }
      
      /* Hide address bar in PWA mode */
      @media (display-mode: standalone) {
        body {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker: unregister di dev, register di production -->
    <script>
      if ('serviceWorker' in navigator) {
        // Deteksi development mode (localhost)
        var isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isDev) {
          // Paksa unregister semua service worker di dev agar tidak interferensi HMR
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
          });
          // Hapus semua cache di dev
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
            });
          }
        }
        // Production: register dilakukan oleh App.tsx
      }
    </script>
  </body>
</html>
