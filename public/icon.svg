<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background dengan sudut tumpul -->
  <rect width="512" height="512" rx="100" fill="#f0f4ff"/>

  <!-- Panah hijau melengkung (bawah) -->
  <path d="M 100 340 Q 256 460 412 340" stroke="#22c55e" stroke-width="36" fill="none" stroke-linecap="round"/>
  <!-- Ujung panah kanan -->
  <polygon points="412,310 440,355 385,358" fill="#22c55e"/>

  <!-- Uang (tumpukan, hijau) -->
  <!-- Lembar belakang -->
  <rect x="148" y="240" width="130" height="82" rx="10" fill="#16a34a" transform="rotate(-8,213,281)"/>
  <!-- Lembar tengah -->
  <rect x="152" y="244" width="130" height="82" rx="10" fill="#22c55e" transform="rotate(-3,217,285)"/>
  <!-- Lembar depan -->
  <rect x="156" y="248" width="130" height="82" rx="10" fill="#4ade80"/>
  <!-- Garis dekorasi uang -->
  <rect x="170" y="268" width="90" height="6" rx="3" fill="#16a34a" opacity="0.5"/>
  <rect x="170" y="282" width="70" height="6" rx="3" fill="#16a34a" opacity="0.5"/>
  <!-- Simbol dollar -->
  <circle cx="213" cy="289" r="18" fill="#16a34a" opacity="0.7"/>
  <text x="213" y="295" text-anchor="middle" font-size="20" font-weight="bold" fill="white" font-family="Arial">$</text>

  <!-- Bar chart biru (3 batang) -->
  <!-- Batang kiri (pendek) -->
  <rect x="230" y="200" width="38" height="120" rx="8" fill="url(#blueGrad1)"/>
  <!-- Batang tengah (sedang) -->
  <rect x="278" y="155" width="38" height="165" rx="8" fill="url(#blueGrad2)"/>
  <!-- Batang kanan (tinggi) -->
  <rect x="326" y="110" width="38" height="210" rx="8" fill="url(#blueGrad3)"/>

  <!-- Highlight putih di bar (efek 3D) -->
  <rect x="234" y="204" width="12" height="60" rx="4" fill="white" opacity="0.3"/>
  <rect x="282" y="159" width="12" height="80" rx="4" fill="white" opacity="0.3"/>
  <rect x="330" y="114" width="12" height="100" rx="4" fill="white" opacity="0.3"/>

  <defs>
    <linearGradient id="blueGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="blueGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
</svg>
