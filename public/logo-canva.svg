<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background transparan untuk PWA -->
  <rect width="1024" height="1024" fill="transparent"/>
  
  <!-- Logo dari Canva - Bar Chart Biru -->
  <g transform="translate(512, 350)">
    <!-- Bar Chart 3D -->
    <rect x="-120" y="-80" width="60" height="160" rx="8" fill="url(#blueGrad1)" transform="skewY(-10)"/>
    <rect x="-40" y="-120" width="60" height="200" rx="8" fill="url(#blueGrad2)" transform="skewY(-10)"/>
    <rect x="40" y="-160" width="60" height="240" rx="8" fill="url(#blueGrad3)" transform="skewY(-10)"/>
    
    <!-- Highlight 3D -->
    <rect x="-115" y="-75" width="15" height="80" rx="4" fill="white" opacity="0.3" transform="skewY(-10)"/>
    <rect x="-35" y="-115" width="15" height="100" rx="4" fill="white" opacity="0.3" transform="skewY(-10)"/>
    <rect x="45" y="-155" width="15" height="120" rx="4" fill="white" opacity="0.3" transform="skewY(-10)"/>
  </g>
  
  <!-- Uang Hijau dengan Efek 3D -->
  <g transform="translate(300, 420)">
    <!-- Tumpukan uang -->
    <rect x="0" y="20" width="180" height="100" rx="12" fill="#16a34a" transform="rotate(-8) skew(-2, 0)"/>
    <rect x="5" y="15" width="180" height="100" rx="12" fill="#22c55e" transform="rotate(-4) skew(-1, 0)"/>
    <rect x="10" y="10" width="180" height="100" rx="12" fill="#4ade80"/>
    
    <!-- Detail uang -->
    <rect x="25" y="35" width="120" height="8" rx="4" fill="#16a34a" opacity="0.6"/>
    <rect x="25" y="55" width="90" height="8" rx="4" fill="#16a34a" opacity="0.6"/>
    
    <!-- Simbol Dollar -->
    <circle cx="100" cy="70" r="25" fill="#16a34a" opacity="0.8"/>
    <text x="100" y="80" text-anchor="middle" font-size="28" font-weight="bold" fill="white" font-family="Arial">$</text>
  </g>
  
  <!-- Panah Hijau Melengkung -->
  <path d="M 200 600 Q 512 750 824 600" stroke="#22c55e" stroke-width="40" fill="none" stroke-linecap="round"/>
  <polygon points="824,570 860,620 800,625" fill="#22c55e"/>
  
  <!-- Glow Effect -->
  <circle cx="512" cy="400" r="300" fill="url(#glow)" opacity="0.2"/>
  
  <!-- Text KEUANGANKU -->
  <text x="512" y="720" text-anchor="middle" font-size="80" font-weight="900" fill="#1e40af" font-family="Arial Black">KEUANGANKU</text>
  
  <!-- Text PENCATATAN -->
  <text x="512" y="780" text-anchor="middle" font-size="32" font-weight="600" fill="#22c55e" font-family="Arial" letter-spacing="8px">PENCATATAN</text>

  <defs>
    <!-- Gradients -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    
    <linearGradient id="blueGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    
    <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    
    <linearGradient id="blueGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
</svg>